apiVersion: apps/v1
kind: Deployment
metadata:
  name: ex23-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ex23-app
  template:
    metadata:
      labels:
        app: ex23-app
    spec:
      containers:
      - name: ex23-app-container
        image: 866252497011.dkr.ecr.us-east-1.amazonaws.com/ex23-app:latest
        ports:
        - containerPort: 5000